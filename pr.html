<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الجهات — TechnoVenture PR</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04010f;
  --card: #0f0728;
  --card2: #130930;
  --border: rgba(120,60,240,.18);
  --accent: #7c3aed;
  --accent2: #a855f7;
  --accent3: #06b6d4;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --text: #e2d9ff;
  --muted: #8b7ab8;
  --glow: rgba(124,58,237,.3);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}

/* ── LOGIN ── */
#loginScreen{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.login-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:48px 40px;width:360px;text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.5);position:relative;z-index:1;
}
.login-box .shield{font-size:52px;margin-bottom:20px}
.login-box h2{font-size:22px;font-weight:700;margin-bottom:4px}
.login-box .login-sub{font-size:12px;color:var(--accent2);font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:24px}
.login-input{
  width:100%;padding:13px 16px;border-radius:10px;
  border:1px solid var(--border);background:rgba(255,255,255,.04);
  color:white;font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px;outline:none;text-align:center;letter-spacing:4px;
  margin-bottom:14px;transition:border-color .2s;
}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.login-err{font-size:13px;color:#f87171;margin-bottom:12px;display:none}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 32px;
  background:rgba(4,1,15,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo img{width:34px;height:34px;object-fit:contain;border-radius:7px}
.logo-text{font-size:16px;font-weight:700;background:linear-gradient(90deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:10px;color:var(--accent2);font-family:'Space Mono',monospace;letter-spacing:1.5px}
.header-right{display:flex;align-items:center;gap:10px}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 32px 80px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;
}
.stat-num{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:white;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--muted)}
.stat-icon{font-size:20px;margin-bottom:8px}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:18px;gap:12px;flex-wrap:wrap;
}
.toolbar-left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.filter-input{
  padding:9px 14px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:white;
  font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;min-width:220px;
}
.filter-input:focus{border-color:var(--accent)}
.filter-input::placeholder{color:rgba(139,122,184,.5)}

.filter-select{
  padding:9px 14px;border-radius:8px;border:1px solid var(--border);
  background:rgba(10,5,30,.8);color:white;
  font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;
  outline:none;cursor:pointer;
}
.filter-select option{background:#1a0d38}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:9px;border:none;
  cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;
  font-weight:600;font-size:13px;transition:all .2s;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6d28d9);color:white;box-shadow:0 3px 12px rgba(124,58,237,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4)}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:white}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-icon{padding:6px 10px;border-radius:7px;font-size:14px}

/* ── CONTACTS GRID ── */
.contacts-grid{display:flex;flex-direction:column;gap:12px}

.contact-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:20px 24px;
  display:grid;grid-template-columns:1fr auto;
  gap:16px;align-items:start;
  transition:border-color .2s,transform .2s;
}
.contact-card:hover{border-color:rgba(124,58,237,.35);transform:translateY(-1px)}

.contact-card.contacted{border-right:3px solid var(--green)}
.contact-card.not-contacted{border-right:3px solid rgba(245,158,11,.6)}
.contact-card.replied{border-right:3px solid var(--accent2)}

.contact-main{}
.contact-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}

.contact-name{font-size:16px;font-weight:700;color:white}

.contact-type{
  font-size:11px;font-family:'Space Mono',monospace;
  background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);
  color:var(--accent2);padding:3px 9px;border-radius:5px;
}

.status-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;
}
.badge-yes{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#34d399}
.badge-no{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fbbf24}
.badge-replied{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);color:var(--accent2)}

.contact-details{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.contact-detail-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:7px;padding:5px 11px;font-size:12px;color:var(--muted);
}
.contact-detail-chip a{color:var(--accent3);text-decoration:none}
.contact-detail-chip a:hover{text-decoration:underline}

.contact-reply{
  margin-top:10px;font-size:13px;color:var(--muted);
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;line-height:1.7;
}
.contact-reply-label{font-size:10px;font-family:'Space Mono',monospace;color:var(--accent2);letter-spacing:1px;margin-bottom:4px}

.contact-date{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);margin-top:8px}

.contact-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0}

/* ── EMPTY ── */
.empty-state{
  text-align:center;padding:80px 20px;color:var(--muted);
}
.empty-icon{font-size:48px;margin-bottom:16px}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:800;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);padding:20px;
}
.modal-overlay.open{display:flex}

.modal{
  background:#0c0620;border:1px solid var(--border);
  border-radius:20px;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

.modal-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 24px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:#0c0620;z-index:1;
}
.modal-title{font-size:17px;font-weight:700}
.modal-close{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--muted);width:32px;height:32px;border-radius:8px;
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.modal-close:hover{color:white;background:rgba(255,255,255,.12)}

.modal-body{padding:24px}

.field{margin-bottom:18px}
label{
  display:block;font-size:11px;font-weight:600;
  color:var(--muted);margin-bottom:7px;
  letter-spacing:.5px;text-transform:uppercase;
}
.required{color:var(--accent2);margin-right:3px}

input[type="text"],input[type="email"],input[type="tel"],
input[type="url"],select,textarea{
  width:100%;padding:11px 14px;border-radius:9px;
  border:1px solid var(--border);background:rgba(255,255,255,.04);
  color:white;font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:14px;outline:none;transition:border-color .2s;direction:rtl;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.15);
  background:rgba(124,58,237,.04);
}
input::placeholder,textarea::placeholder{color:rgba(139,122,184,.5)}
textarea{resize:vertical;min-height:80px;line-height:1.7}
select option{background:#1a0d38}

.contact-methods{display:flex;flex-direction:column;gap:8px}
.contact-method-row{display:flex;gap:8px;align-items:center}
.contact-method-row input{flex:1}
.btn-remove-method{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  color:#f87171;padding:8px 10px;border-radius:7px;
  cursor:pointer;font-size:13px;flex-shrink:0;transition:all .2s;
}
.btn-remove-method:hover{background:rgba(239,68,68,.2)}
.btn-add-method{
  background:rgba(124,58,237,.08);border:1px dashed rgba(124,58,237,.3);
  color:var(--accent2);padding:9px;border-radius:8px;
  cursor:pointer;font-size:13px;font-family:'IBM Plex Sans Arabic',sans-serif;
  transition:all .2s;margin-top:4px;
}
.btn-add-method:hover{background:rgba(124,58,237,.15);border-color:var(--accent)}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.modal-footer{
  display:flex;justify-content:flex-end;gap:10px;
  padding:16px 24px;border-top:1px solid var(--border);
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px 22px;font-size:13px;
  z-index:9999;transition:transform .3s;box-shadow:0 8px 30px rgba(0,0,0,.4);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:#34d399}
.toast.error{border-color:var(--red);color:#f87171}

/* ── DELETE CONFIRM ── */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:900;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.confirm-overlay.open{display:flex}
.confirm-box{
  background:#0c0620;border:1px solid rgba(239,68,68,.3);
  border-radius:16px;padding:32px;max-width:380px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.confirm-box .danger-icon{font-size:44px;margin-bottom:16px}
.confirm-box h3{font-size:18px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7}
.confirm-buttons{display:flex;gap:10px;justify-content:center}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  header{padding:12px 16px}
  .page{padding:16px 16px 60px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .field-row{grid-template-columns:1fr}
  .contact-card{grid-template-columns:1fr}
  .contact-actions{flex-direction:row}
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="shield">📣</div>
    <h2>فريق العلاقات العامة</h2>
    <div class="login-sub">PR TEAM — TECHNOVENTURE</div>
    <input class="login-input" type="password" id="passInput" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="loginErr">كلمة المرور غير صحيحة</div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <a class="logo" href="index.html">
    <img src="tecClub.jpg" alt="logo">
    <div>
      <div class="logo-text">TechnoVenture</div>
      <div class="logo-sub">PR CONTACTS</div>
    </div>
  </a>
  <div class="header-right">
    <span id="liveCount" style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)"></span>
    <button class="btn btn-ghost" onclick="doLogout()" style="color:#f87171">خروج</button>
  </div>
</header>

<div class="page">

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">إجمالي الجهات</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-num" id="s-contacted">0</div>
      <div class="stat-label">تم التواصل</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-num" id="s-pending">0</div>
      <div class="stat-label">لم يتم التواصل</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"></div>
      <div class="stat-num" id="s-replied">0</div>
      <div class="stat-label">ردّت</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input class="filter-input" type="text" id="searchInput" placeholder="🔍 ابحث باسم الجهة..." oninput="applyFilters()">
      <select class="filter-select" id="statusFilter" onchange="applyFilters()">
        <option value="">كل الحالات</option>
        <option value="no">لم يتم التواصل</option>
        <option value="yes">تم التواصل</option>
        <option value="replied">ردّت</option>
      </select>
      <select class="filter-select" id="typeFilter" onchange="applyFilters()">
        <option value="">كل الأنواع</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="openModal()">＋ إضافة جهة</button>
  </div>

  <!-- LIST -->
  <div class="contacts-grid" id="contactsGrid"></div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">إضافة جهة جديدة</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="field">
        <label>الاسم (جهة / شخص) <span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="مثال: Master Works">
      </div>

      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label>المجال أو الصفة <span class="required">*</span></label>
          <input type="text" id="f-type" placeholder="مثال: جهة داعمة، شريك، راعي...">
        </div>
        <div class="field" style="margin-bottom:0">
          <label>حالة التواصل</label>
          <select id="f-status">
            <option value="no">لم يتم التواصل</option>
            <option value="yes">تم التواصل</option>
            <option value="replied">ردّت</option>
          </select>
        </div>
      </div>

      <div style="margin-bottom:18px"></div>

      <div class="field">
        <label>طرق التواصل (إيميل / رقم / لينكدإن / ...)</label>
        <div class="contact-methods" id="contactMethods"></div>
        <button class="btn-add-method" onclick="addMethodField()">+ إضافة طريقة تواصل</button>
      </div>

      <div class="field">
        <label>الرد (إن وُجد)</label>
        <textarea id="f-reply" placeholder="اكتب الرد أو ملاحظات التواصل هنا..."></textarea>
      </div>

      <div class="field">
        <label>ملاحظات إضافية</label>
        <textarea id="f-notes" placeholder="أي معلومات إضافية عن هذه الجهة..." style="min-height:60px"></textarea>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveContact()">💾 حفظ</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="danger-icon"></div>
    <h3>حذف الجهة</h3>
    <p>هل أنت متأكد من حذف هذه الجهة؟<br>لا يمكن التراجع عن هذا الإجراء.</p>
    <div class="confirm-buttons">
      <button class="btn btn-ghost" onclick="closeConfirm()">إلغاء</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">نعم، احذف</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot,
  addDoc, updateDoc, deleteDoc, doc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",
  authDomain: "tec-expo-voting.firebaseapp.com",
  projectId: "tec-expo-voting",
  storageBucket: "tec-expo-voting.firebasestorage.app",
  messagingSenderId: "481340074318",
  appId: "1:481340074318:web:5248e7eb360c4f5eed161f"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let s=[];
  function r(){c.width=innerWidth;c.height=innerHeight;s=Array.from({length:100},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1+.2,a:Math.random(),sp:Math.random()*.007+.002}))}
  function d(){ctx.clearRect(0,0,c.width,c.height);s.forEach(p=>{p.a+=p.sp;const al=(Math.sin(p.a)+1)/2*.6+.1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,180,255,${al})`;ctx.fill()});requestAnimationFrame(d)}
  r();d();window.addEventListener('resize',r);
})();

const PASS = "pr2026";
let allContacts = [];
let filtered    = [];
let editingId   = null;
let deleteId    = null;

window.doLogin = function() {
  if (document.getElementById('passInput').value === PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    init();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('passInput').value = '';
  }
};
window.doLogout = function() {
  document.getElementById('loginScreen').style.display = 'flex';
};

function init() {
  onSnapshot(collection(db, 'pr_contacts'), snap => {
    allContacts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allContacts.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    updateStats();
    buildTypeFilter();
    applyFilters();
  });
}

function updateStats() {
  document.getElementById('s-total').textContent     = allContacts.length;
  document.getElementById('s-contacted').textContent = allContacts.filter(c=>c.status==='yes').length;
  document.getElementById('s-pending').textContent   = allContacts.filter(c=>c.status==='no').length;
  document.getElementById('s-replied').textContent   = allContacts.filter(c=>c.status==='replied').length;
  document.getElementById('liveCount').textContent   = `${allContacts.length} جهة`;
}

function buildTypeFilter() {
  const types = [...new Set(allContacts.map(c=>c.type).filter(Boolean))];
  const sel = document.getElementById('typeFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">كل الأنواع</option>';
  types.forEach(t => { const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o); });
  sel.value = cur;
}

window.applyFilters = function() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const type   = document.getElementById('typeFilter').value;

  filtered = allContacts.filter(c => {
    const mQ = !q || c.name?.toLowerCase().includes(q);
    const mS = !status || c.status === status;
    const mT = !type   || c.type === type;
    return mQ && mS && mT;
  });
  renderGrid();
};

function renderGrid() {
  const grid = document.getElementById('contactsGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>لا توجد جهات — أضف جهة جديدة</div></div>`;
    return;
  }

  const statusMap = {
    no:      ['badge-no',      ' لم يتم التواصل', 'not-contacted'],
    yes:     ['badge-yes',     ' تم التواصل',     'contacted'],
    replied: ['badge-replied', ' ردّت',           'replied']
  };

  grid.innerHTML = filtered.map(c => {
    const [badgeCls, badgeLabel, cardCls] = statusMap[c.status||'no'];
    const methods = (c.methods||[]).map(m => {
      const isEmail = m.includes('@');
      const isPhone = /^\+?[0-9\s]+$/.test(m.trim());
      const isUrl   = m.startsWith('http') || m.startsWith('linkedin');
      let link = '';
      if (isEmail) link = `<a href="mailto:${m}">${m}</a>`;
      else if (isPhone) link = `<a href="tel:${m.replace(/\s/g,'')}">${m}</a>`;
      else if (isUrl)  link = `<a href="${m}" target="_blank">${m}</a>`;
      else link = m;
      return `<span class="contact-detail-chip">${link}</span>`;
    }).join('');

    const date = c.createdAt?.seconds
      ? new Date(c.createdAt.seconds*1000).toLocaleDateString('ar-SA')
      : '—';

    const replyBlock = c.reply ? `
      <div class="contact-reply">
        <div class="contact-reply-label">الرد</div>
        ${c.reply}
      </div>` : '';

    const notesBlock = c.notes ? `
      <div class="contact-reply" style="border-color:rgba(6,182,212,.15)">
        <div class="contact-reply-label" style="color:var(--accent3)">ملاحظات</div>
        ${c.notes}
      </div>` : '';

    return `
    <div class="contact-card ${cardCls}">
      <div class="contact-main">
        <div class="contact-header">
          <span class="contact-name">${c.name||'—'}</span>
          <span class="contact-type">${c.type||'—'}</span>
          <span class="status-badge ${badgeCls}">${badgeLabel}</span>
        </div>
        ${methods ? `<div class="contact-details">${methods}</div>` : ''}
        ${replyBlock}
        ${notesBlock}
        <div class="contact-date">أُضيفت: ${date}</div>
      </div>
      <div class="contact-actions">
        <button class="btn btn-ghost btn-sm btn-icon" title="تعديل" onclick="editContact('${c.id}')">✏️</button>
        <button class="btn btn-danger btn-sm btn-icon" title="حذف" onclick="confirmDelete('${c.id}')">🗑️</button>
        <div style="margin-top:4px">
          ${c.status!=='yes'     ? `<button class="btn btn-sm" style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#34d399;font-size:11px;margin-bottom:4px;display:block;width:100%" onclick="quickStatus('${c.id}','yes')">✅ تم التواصل</button>` : ''}
          ${c.status!=='replied' ? `<button class="btn btn-sm" style="background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.25);color:var(--accent2);font-size:11px;display:block;width:100%" onclick="quickStatus('${c.id}','replied')">💬 ردّت</button>` : ''}
          ${c.status!=='no'      ? `<button class="btn btn-sm" style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fbbf24;font-size:11px;margin-top:4px;display:block;width:100%" onclick="quickStatus('${c.id}','no')">⏳ إعادة للانتظار</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

window.quickStatus = async function(id, status) {
  await updateDoc(doc(db,'pr_contacts',id), {status});
  const labels = {yes:' تم تحديث الحالة',replied:' سُجّل الرد',no:' أُعيدت للانتظار'};
  showToast(labels[status]||'تم التحديث','success');
};

window.openModal = function(contact=null) {
  editingId = contact?.id || null;
  document.getElementById('modalTitle').textContent = contact ? 'تعديل الجهة' : 'إضافة جهة جديدة';
  document.getElementById('f-name').value   = contact?.name  || '';
  document.getElementById('f-type').value   = contact?.type  || '';
  document.getElementById('f-status').value = contact?.status|| 'no';
  document.getElementById('f-reply').value  = contact?.reply || '';
  document.getElementById('f-notes').value  = contact?.notes || '';

  const container = document.getElementById('contactMethods');
  container.innerHTML = '';
  const methods = contact?.methods || [''];
  methods.forEach(m => addMethodField(m));

  document.getElementById('modalOverlay').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
};

window.editContact = function(id) {
  const c = allContacts.find(x=>x.id===id);
  if (c) openModal(c);
};

window.addMethodField = function(val='') {
  const container = document.getElementById('contactMethods');
  const row = document.createElement('div');
  row.className = 'contact-method-row';
  row.innerHTML = `
    <input type="text" placeholder="إيميل / رقم / رابط لينكدإن..." value="${val}" style="direction:ltr;text-align:left">
    <button class="btn-remove-method" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(row);
};

/* ── SAVE ── */
window.saveContact = async function() {
  const name = document.getElementById('f-name').value.trim();
  const type = document.getElementById('f-type').value.trim();
  if (!name || !type) { showToast('الاسم والمجال مطلوبان','error'); return; }

  const methods = [...document.querySelectorAll('#contactMethods input')]
    .map(i=>i.value.trim()).filter(Boolean);

  const data = {
    name,
    type,
    status:  document.getElementById('f-status').value,
    methods,
    reply:   document.getElementById('f-reply').value.trim(),
    notes:   document.getElementById('f-notes').value.trim(),
  };

  const btn = document.getElementById('saveBtn');
  btn.textContent = ' جارٍ الحفظ...';
  btn.disabled = true;

  try {
    if (editingId) {
      await updateDoc(doc(db,'pr_contacts',editingId), data);
      showToast(' تم تحديث الجهة بنجاح','success');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db,'pr_contacts'), data);
      showToast(' تمت إضافة الجهة بنجاح','success');
    }
    closeModal();
  } catch(e) {
    console.error(e);
    showToast('حدث خطأ، حاول مجدداً','error');
  } finally {
    btn.textContent = ' حفظ';
    btn.disabled = false;
  }
};


window.confirmDelete = function(id) {
  deleteId = id;
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmDeleteBtn').onclick = async () => {
    await deleteDoc(doc(db,'pr_contacts',deleteId));
    showToast(' تم حذف الجهة','error');
    closeConfirm();
  };
};
window.closeConfirm = function() {
  document.getElementById('confirmOverlay').classList.remove('open');
  deleteId = null;
};


function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
