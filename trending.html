<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>Trending Projects</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:#0e0520;
color:white;
padding:40px;
text-align:center;
}

.card{
background:#1a0d38;
padding:20px;
border-radius:12px;
margin:10px auto;
max-width:400px;
}

</style>

</head>


<body>

<h1>🔥 المشاريع الأكثر استثمارًا</h1>

<div id="list"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",

authDomain: "tec-expo-voting.firebaseapp.com",

projectId: "tec-expo-voting",

storageBucket: "tec-expo-voting.firebasestorage.app",

messagingSenderId: "481340074318",

appId: "1:481340074318:web:5248e7eb360c4f5eed161f"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const projectsRef = collection(db,"projects");


onSnapshot(projectsRef,(snapshot)=>{

let projects=snapshot.docs.map(doc=>doc.data());

projects=projects.filter(p=>!p.deleted);

projects.sort((a,b)=>(b.funds||0)-(a.funds||0));

projects=projects.slice(0,5);

let html="";

projects.forEach(p=>{

html+=`

<div class="card">

<h2>${p.title}</h2>

💰 ${p.funds||0} ريال

</div>

`;

});

document.getElementById("list").innerHTML=html;

});

</script>

</body>
</html>
