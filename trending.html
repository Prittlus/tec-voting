<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending — TechnoVenture</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #04010f;
  --card: #0f0728;
  --border: rgba(120, 60, 240, 0.18);
  --accent: #7c3aed;
  --accent2: #a855f7;
  --accent3: #06b6d4;
  --red: #ef4444;
  --orange: #f97316;
  --text: #e2d9ff;
  --muted: #8b7ab8;
  --glow: rgba(124, 58, 237, 0.35);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#stars-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: .5;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 48px;
  background: rgba(4, 1, 15, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 38px;
  height: 38px;
  object-fit: contain;
  border-radius: 8px;
}

.logo-text {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(90deg, #fff, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hot-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(239, 68, 68, .15);
  border: 1px solid rgba(239, 68, 68, .4);
  color: #f87171;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
  animation: flamePulse 2s ease infinite;
}

@keyframes flamePulse {
  0%,100% { box-shadow: 0 0 8px rgba(239,68,68,.2); }
  50%      { box-shadow: 0 0 20px rgba(239,68,68,.45); }
}

/* ── PAGE ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 32px 80px;
}

/* ── HEADER ── */
.page-header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeUp .6s ease both;
}

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: #f87171;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.page-title {
  font-size: clamp(30px, 5vw, 48px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1.1;
  margin-bottom: 10px;
}

.page-title span {
  background: linear-gradient(135deg, var(--red), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.page-sub {
  color: var(--muted);
  font-size: 14px;
}

/* ── CARDS ── */
#list { display: flex; flex-direction: column; gap: 14px; }

.trend-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  overflow: hidden;
  transition: transform .25s, border-color .25s, box-shadow .25s;
  animation: fadeUp .5s ease both;
}

.trend-card:hover {
  transform: translateX(-4px);
  border-color: rgba(239, 68, 68, .35);
  box-shadow: 0 12px 40px rgba(0,0,0,.35);
}

/* top glow line */
.trend-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity .25s;
}

.trend-card:hover::before { opacity: 1; }

.trend-card.rank-1::before { background: linear-gradient(90deg, #ef4444, #f97316); }
.trend-card.rank-2::before { background: linear-gradient(90deg, #f97316, #fbbf24); }
.trend-card.rank-3::before { background: linear-gradient(90deg, #fbbf24, #facc15); }
.trend-card.rank-4::before,
.trend-card.rank-5::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

/* rank number */
.trend-rank {
  font-family: 'Space Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  min-width: 48px;
  text-align: center;
  flex-shrink: 0;
  line-height: 1;
}

.rank-1 .trend-rank { color: #ef4444; text-shadow: 0 0 20px rgba(239,68,68,.5); }
.rank-2 .trend-rank { color: #f97316; text-shadow: 0 0 16px rgba(249,115,22,.4); }
.rank-3 .trend-rank { color: #fbbf24; text-shadow: 0 0 16px rgba(251,191,36,.4); }
.rank-4 .trend-rank,
.rank-5 .trend-rank { color: var(--muted); }

/* info */
.trend-info { flex: 1; min-width: 0; }

.trend-title {
  font-size: 18px;
  font-weight: 700;
  color: white;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rank-1 .trend-title { font-size: 20px; }

.trend-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.trend-team {
  font-size: 12px;
  color: var(--muted);
}

.trend-cat {
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--accent2);
  background: rgba(124,58,237,.1);
  border: 1px solid rgba(124,58,237,.2);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: .5px;
}

/* bar */
.trend-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
  min-width: 110px;
}

.trend-funds {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 18px;
  color: white;
  white-space: nowrap;
  direction: ltr;
}

.rank-1 .trend-funds { font-size: 22px; color: #fca5a5; }
.rank-2 .trend-funds { color: #fdba74; }
.rank-3 .trend-funds { color: #fde68a; }

.trend-sar {
  font-size: 11px;
  color: var(--muted);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}

.trend-bar {
  width: 100%;
  height: 5px;
  background: rgba(255,255,255,.06);
  border-radius: 3px;
  overflow: hidden;
}

.trend-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s ease;
}

.rank-1 .trend-fill { background: linear-gradient(90deg, #ef4444, #f97316); }
.rank-2 .trend-fill { background: linear-gradient(90deg, #f97316, #fbbf24); }
.rank-3 .trend-fill { background: linear-gradient(90deg, #fbbf24, #facc15); }
.rank-4 .trend-fill,
.rank-5 .trend-fill { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

/* flame icon for #1 */
.flame-tag {
  position: absolute;
  top: 14px;
  left: 18px;
  font-size: 11px;
  background: rgba(239,68,68,.15);
  border: 1px solid rgba(239,68,68,.3);
  color: #f87171;
  padding: 3px 8px;
  border-radius: 5px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
}

/* ── EMPTY ── */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 560px) {
  header { padding: 14px 20px; }
  .page  { padding: 36px 16px 60px; }
  .trend-rank { font-size: 24px; min-width: 36px; }
  .trend-right { min-width: 80px; }
  .trend-funds { font-size: 15px; }
  .rank-1 .trend-funds { font-size: 17px; }
  .trend-cat { display: none; }
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<header>
  <a class="logo" href="index.html">
    <img class="logo-icon" src="tecClub.jpg" alt="logo">
    <div class="logo-text">TechnoVenture</div>
  </a>
  <div class="hot-badge">🔥 HOT RIGHT NOW</div>
</header>

<div class="page">

  <div class="page-header">
    <div class="section-label">الأكثر زخمًا</div>
    <h1 class="page-title"><span> Trending</span> Projects</h1>
    <p class="page-sub">أكثر ٥ مشاريع استقطابًا للاستثمارات — يتحدّث لحظيًا</p>
  </div>

  <div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",
  authDomain: "tec-expo-voting.firebaseapp.com",
  projectId: "tec-expo-voting",
  storageBucket: "tec-expo-voting.firebasestorage.app",
  messagingSenderId: "481340074318",
  appId: "1:481340074318:web:5248e7eb360c4f5eed161f"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* Stars */
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 130 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + .2,
      a: Math.random(),
      speed: Math.random() * .008 + .002
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = (Math.sin(s.a) + 1) / 2 * .7 + .1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,180,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); draw();
  window.addEventListener('resize', resize);
})();

onSnapshot(collection(db, "projects"), snapshot => {
  let projects = snapshot.docs.map(d => d.data()).filter(p => !p.deleted);
  projects.sort((a, b) => (b.funds || 0) - (a.funds || 0));
  projects = projects.slice(0, 5);

  const list    = document.getElementById('list');
  const maxFund = projects[0]?.funds || 1;

  if (!projects.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon"></div><p>لا توجد مشاريع بعد</p></div>`;
    return;
  }

  list.innerHTML = projects.map((p, i) => {
    const rank = i + 1;
    const pct  = Math.round((p.funds || 0) / maxFund * 100);
    return `
      <div class="trend-card rank-${rank}" style="animation-delay:${i * 0.08}s">
        ${rank === 1 ? '<span class="flame-tag"> TOP</span>' : ''}
        <div class="trend-rank">${rank}</div>
        <div class="trend-info">
          <div class="trend-title">${p.title}</div>
          <div class="trend-meta">
            <span class="trend-team">👥 ${p.team}</span>
            ${p.category ? `<span class="trend-cat">${p.category}</span>` : ''}
          </div>
          <div class="trend-bar" style="margin-top:10px">
            <div class="trend-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="trend-right">
          <div class="trend-funds">${(p.funds || 0).toLocaleString('ar-SA')} <span class="trend-sar">ريال</span></div>
          <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${pct}%</div>
        </div>
      </div>`;
  }).join('');
});
</script>
</body>
</html>
