<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Trending Now</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@700&display=swap" rel="stylesheet">

<style>
body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:radial-gradient(circle,#1a0d38,#0e0520);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.box{
background:#1f1244;
padding:4rem;
border-radius:20px;
animation:fade .8s ease-in-out;
}

@keyframes fade{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

h1{
font-size:3rem;
margin-bottom:1rem;
}

.votes{
font-size:2.5rem;
color:#a78bfa;
}

.fullscreen-btn{
position:fixed;
top:20px;
left:20px;
background:#7c3aed;
color:white;
border:none;
padding:.5rem 1rem;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<button class="fullscreen-btn" onclick="goFull()">⛶ ملء الشاشة</button>

<div class="box">
<h1 id="title">🔥 Trending Now</h1>
<div class="votes" id="votes">0</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",
authDomain: "tec-expo-voting.firebaseapp.com",
projectId: "tec-expo-voting",
storageBucket: "tec-expo-voting.firebasestorage.app",
messagingSenderId: "481340074318",
appId: "1:481340074318:web:5248e7eb360c4f5eed161f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const projectsRef = collection(db,"projects");

onSnapshot(projectsRef,(snapshot)=>{

const projects=snapshot.docs.map(doc=>doc.data())
.filter(p=>!p.deleted);

projects.sort((a,b)=>b.votes-a.votes);

if(projects.length>0){
document.getElementById("title").innerText="🔥 "+projects[0].title;
document.getElementById("votes").innerText=projects[0].votes+" صوت";
}

});

window.goFull=function(){
document.documentElement.requestFullscreen();
};

</script>

</body>
</html>
