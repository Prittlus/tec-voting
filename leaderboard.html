<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 TEC Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:radial-gradient(circle at top,#1a0d38,#0e0520);
color:white;
margin:0;
padding:2rem;
text-align:center;
overflow:hidden;
}

h1{
font-size:2.5rem;
margin-bottom:2rem;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1f1244;
margin-bottom:1rem;
padding:1.2rem;
border-radius:14px;
font-size:1.4rem;
display:flex;
justify-content:space-between;
align-items:center;
transform:translateY(20px);
opacity:0;
animation:fadeIn .6s forwards;
}

@keyframes fadeIn{
to{transform:translateY(0);opacity:1;}
}

.rank1{background:linear-gradient(90deg,#fbbf24,#f59e0b);color:black;font-weight:bold;}
.rank2{background:#c0c0c0;color:black;}
.rank3{background:#cd7f32;color:black;}

.votes{
font-weight:bold;
font-size:1.5rem;
color:#a78bfa;
}

.fullscreen-btn{
position:fixed;
top:20px;
left:20px;
background:#7c3aed;
color:white;
border:none;
padding:.5rem 1rem;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<button class="fullscreen-btn" onclick="goFull()">⛶ ملء الشاشة</button>

<h1>🏆 الترتيب المباشر</h1>
<div class="container" id="leaderboard"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",
authDomain: "tec-expo-voting.firebaseapp.com",
projectId: "tec-expo-voting",
storageBucket: "tec-expo-voting.firebasestorage.app",
messagingSenderId: "481340074318",
appId: "1:481340074318:web:5248e7eb360c4f5eed161f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const projectsRef = collection(db,"projects");

function animateValue(element,start,end,duration){
let startTime=null;
function step(timestamp){
if(!startTime) startTime=timestamp;
const progress=Math.min((timestamp-startTime)/duration,1);
element.innerText=Math.floor(progress*(end-start)+start);
if(progress<1) requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

onSnapshot(projectsRef,(snapshot)=>{

const projects=snapshot.docs.map(doc=>doc.data())
.filter(p=>!p.deleted);

projects.sort((a,b)=>b.votes-a.votes);

const container=document.getElementById("leaderboard");
container.innerHTML="";

projects.forEach((p,i)=>{
const div=document.createElement("div");
div.className="card "+(i==0?"rank1":i==1?"rank2":i==2?"rank3":"");

div.innerHTML=`
<span>${i+1}. ${p.title}</span>
<span class="votes" id="v${i}">0</span>
`;

container.appendChild(div);

setTimeout(()=>{
animateValue(document.getElementById("v"+i),0,p.votes||0,800);
},200);
});

});

window.goFull=function(){
document.documentElement.requestFullscreen();
};

</script>

</body>
</html>
