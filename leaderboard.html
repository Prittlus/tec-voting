<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:#0e0520;
color:white;
margin:0;
padding:40px;
text-align:center;
}

h1{
margin-bottom:40px;
}

.top3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:#1a0d38;
padding:25px;
border-radius:14px;
border:1px solid #2d1b55;
}

.rank{
font-size:40px;
margin-bottom:10px;
}

.title{
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.money{
font-size:26px;
color:#a78bfa;
font-weight:700;
}

.list{
max-width:600px;
margin:auto;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 16px;
background:#1a0d38;
border-radius:10px;
margin-bottom:10px;
}

.row span{
font-weight:600;
}

.total{
margin-top:30px;
font-size:20px;
color:#c4b5fd;
}

</style>

</head>

<body>

<h1>🏆 ترتيب المشاريع</h1>

<div class="top3" id="top3"></div>

<div class="list" id="list"></div>

<div class="total" id="total"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",

authDomain: "tec-expo-voting.firebaseapp.com",

projectId: "tec-expo-voting",

storageBucket: "tec-expo-voting.firebasestorage.app",

messagingSenderId: "481340074318",

appId: "1:481340074318:web:5248e7eb360c4f5eed161f"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const projectsRef = collection(db,"projects");


onSnapshot(projectsRef,(snapshot)=>{

let projects=snapshot.docs.map(doc=>doc.data());

projects=projects.filter(p=>!p.deleted);

projects.sort((a,b)=>(b.funds||0)-(a.funds||0));

let topHTML="";
let listHTML="";
let total=0;

projects.forEach((p,i)=>{

total += p.funds||0;

if(i<3){

const medals=["🥇","🥈","🥉"];

topHTML+=`

<div class="card">

<div class="rank">${medals[i]}</div>

<div class="title">${p.title}</div>

<div class="money">💰 ${p.funds||0} ريال</div>

</div>

`;

}else{

listHTML+=`

<div class="row">

<span>${i+1} - ${p.title}</span>

<span>💰 ${p.funds||0}</span>

</div>

`;

}

});

document.getElementById("top3").innerHTML=topHTML;

document.getElementById("list").innerHTML=listHTML;

document.getElementById("total").innerText="إجمالي الاستثمارات: "+total+" ريال";

});

</script>

</body>
</html>
