<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — TechnoVenture</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #04010f;
  --surface: #0a0520;
  --card: #0f0728;
  --border: rgba(120, 60, 240, 0.18);
  --accent: #7c3aed;
  --accent2: #a855f7;
  --accent3: #06b6d4;
  --gold: #f59e0b;
  --silver: #94a3b8;
  --bronze: #b45309;
  --text: #e2d9ff;
  --muted: #8b7ab8;
  --glow: rgba(124, 58, 237, 0.35);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#stars-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: .5;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 48px;
  background: rgba(4, 1, 15, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 38px;
  height: 38px;
  object-fit: contain;
  border-radius: 8px;
}

.logo-text {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(90deg, #fff, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(239, 68, 68, .15);
  border: 1px solid rgba(239, 68, 68, .35);
  color: #f87171;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
}

.live-dot {
  width: 6px; height: 6px;
  background: #ef4444;
  border-radius: 50%;
  box-shadow: 0 0 6px #ef4444;
  animation: pulse 1.5s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.4; transform:scale(1.5); }
}

/* ── PAGE ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 1000px;
  margin: 0 auto;
  padding: 60px 40px 80px;
}

/* ── PAGE TITLE ── */
.page-header {
  text-align: center;
  margin-bottom: 56px;
  animation: fadeUp .6s ease both;
}

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent2);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.page-title {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1.1;
  margin-bottom: 14px;
}

.page-title span {
  background: linear-gradient(135deg, var(--gold), #fcd34d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.page-sub {
  color: var(--muted);
  font-size: 15px;
}

/* ── TOTAL STAT ── */
.total-bar {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  margin-bottom: 52px;
  animation: fadeUp .6s .1s ease both;
}

.total-stat {
  text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 36px;
}

.total-num {
  font-family: 'Space Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.total-label {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: .5px;
}

/* ── TOP 3 PODIUM ── */
.podium {
  display: grid;
  grid-template-columns: 1fr 1.15fr 1fr;
  gap: 16px;
  align-items: end;
  margin-bottom: 40px;
  animation: fadeUp .6s .15s ease both;
}

.podium-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform .25s;
}

.podium-card:hover { transform: translateY(-4px); }

/* 1st place */
.podium-card.first {
  border-color: rgba(245, 158, 11, .5);
  box-shadow: 0 0 40px rgba(245, 158, 11, .12), 0 0 0 1px rgba(245, 158, 11, .15);
}

.podium-card.first::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #f59e0b, #fcd34d, #f59e0b);
}

/* 2nd */
.podium-card.second {
  border-color: rgba(148, 163, 184, .35);
}

.podium-card.second::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #94a3b8, #cbd5e1, #94a3b8);
}

/* 3rd */
.podium-card.third {
  border-color: rgba(180, 83, 9, .35);
}

.podium-card.third::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #b45309, #d97706, #b45309);
}

.podium-medal {
  font-size: 44px;
  margin-bottom: 14px;
  display: block;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.4));
}

.first .podium-medal { font-size: 56px; }

.podium-rank {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.podium-title {
  font-size: 17px;
  font-weight: 700;
  color: white;
  margin-bottom: 4px;
  line-height: 1.3;
}

.first .podium-title { font-size: 20px; }

.podium-team {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}

.podium-funds {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  color: white;
}

.first .podium-funds { font-size: 24px; color: #fcd34d; }
.second .podium-funds { font-size: 20px; color: var(--silver); }
.third .podium-funds  { font-size: 18px; color: #d97706; }

.podium-sar {
  font-size: 11px;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-weight: 400;
  color: var(--muted);
  margin-right: 3px;
}

/* progress bar inside card */
.podium-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,.06);
  border-radius: 2px;
  margin-top: 14px;
  overflow: hidden;
}

.podium-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease;
}

.first  .podium-fill { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
.second .podium-fill { background: linear-gradient(90deg, #64748b, #94a3b8); }
.third  .podium-fill { background: linear-gradient(90deg, #92400e, #d97706); }

/* ── REST LIST ── */
.list-wrapper {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  animation: fadeUp .6s .25s ease both;
}

.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
}

.list-header-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.list-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  border-bottom: 1px solid rgba(120,60,240,.08);
  transition: background .2s;
}

.list-row:last-child { border-bottom: none; }
.list-row:hover { background: rgba(124, 58, 237, .06); }

.row-rank {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}

.row-info { flex: 1; min-width: 0; }

.row-title {
  font-size: 15px;
  font-weight: 600;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-team {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.row-bar-wrap {
  flex: 1;
  max-width: 180px;
}

.row-bar {
  height: 5px;
  background: rgba(255,255,255,.06);
  border-radius: 3px;
  overflow: hidden;
}

.row-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 1s ease;
}

.row-funds {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent2);
  white-space: nowrap;
  text-align: left;
  direction: ltr;
}

.row-sar {
  font-size: 11px;
  color: var(--muted);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}

/* ── EMPTY ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  header { padding: 14px 20px; }
  .page  { padding: 36px 16px 60px; }
  .podium { grid-template-columns: 1fr; align-items: stretch; }
  .podium-card.first { order: -1; }
  .row-bar-wrap { display: none; }
  .total-stat { padding: 14px 24px; }
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<header>
  <a class="logo" href="index.html">
    <img class="logo-icon" src="teccLUB.jpg" alt="logo">
    <div>
      <div class="logo-text">TechnoVenture</div>
    </div>
  </a>
  <div class="live-badge">
    <span class="live-dot"></span>
    LIVE RESULTS
  </div>
</header>

<div class="page">

  <div class="page-header">
    <div class="section-label">النتائج الحية</div>
    <h1 class="page-title">🏆 <span>Leaderboard</span></h1>
    <p class="page-sub">يتحدّث التصنيف تلقائياً مع كل استثمار جديد</p>
  </div>

  <div class="total-bar" id="totalBar"></div>

  <div class="podium" id="top3"></div>

  <div class="list-wrapper" id="listWrapper" style="display:none">
    <div class="list-header">
      <span class="list-header-title">المشاريع الأخرى</span>
      <span class="list-header-title" id="restCount"></span>
    </div>
    <div id="list"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",
  authDomain: "tec-expo-voting.firebaseapp.com",
  projectId: "tec-expo-voting",
  storageBucket: "tec-expo-voting.firebasestorage.app",
  messagingSenderId: "481340074318",
  appId: "1:481340074318:web:5248e7eb360c4f5eed161f"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* Stars */
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 140 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + .2,
      a: Math.random(),
      speed: Math.random() * .008 + .002
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = (Math.sin(s.a) + 1) / 2 * .7 + .1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,180,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  draw();
  window.addEventListener('resize', resize);
})();

onSnapshot(collection(db, "projects"), snapshot => {
  let projects = snapshot.docs.map(d => d.data()).filter(p => !p.deleted);
  projects.sort((a, b) => (b.funds || 0) - (a.funds || 0));

  const total   = projects.reduce((s, p) => s + (p.funds || 0), 0);
  const maxFund = projects[0]?.funds || 1;

  /* total bar */
  document.getElementById('totalBar').innerHTML = `
    <div class="total-stat">
      <div class="total-num">${total.toLocaleString('ar-SA')}</div>
      <div class="total-label">إجمالي الاستثمارات (ريال)</div>
    </div>
    <div class="total-stat">
      <div class="total-num">${projects.length}</div>
      <div class="total-label">مشروع مشارك</div>
    </div>`;

  /* podium top 3 */
  const medals  = ['first','second','third'];
  const emojis  = ['🥇','🥈','🥉'];
  const ranks   = ['المركز الأول','المركز الثاني','المركز الثالث'];
  const top3    = projects.slice(0, 3);

  /* reorder for visual podium: 2nd | 1st | 3rd */
  const order = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3;

  document.getElementById('top3').innerHTML = order.map((p, vi) => {
    if (!p) return '';
    const realIdx = top3.indexOf(p);
    const pct     = Math.round((p.funds || 0) / maxFund * 100);
    return `
      <div class="podium-card ${medals[realIdx]}">
        <span class="podium-medal">${emojis[realIdx]}</span>
        <div class="podium-rank">${ranks[realIdx]}</div>
        <div class="podium-title">${p.title}</div>
        <div class="podium-team">${p.team}</div>
        <div class="podium-funds">${(p.funds || 0).toLocaleString('ar-SA')}<span class="podium-sar"> ريال</span></div>
        <div class="podium-bar"><div class="podium-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');

  /* rest of list */
  const rest = projects.slice(3);
  if (rest.length) {
    document.getElementById('listWrapper').style.display = 'block';
    document.getElementById('restCount').textContent = `${rest.length} مشروع`;
    document.getElementById('list').innerHTML = rest.map((p, i) => {
      const pct = Math.round((p.funds || 0) / maxFund * 100);
      return `
        <div class="list-row">
          <div class="row-rank">${i + 4}</div>
          <div class="row-info">
            <div class="row-title">${p.title}</div>
            <div class="row-team">${p.team}</div>
          </div>
          <div class="row-bar-wrap">
            <div class="row-bar"><div class="row-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="row-funds">${(p.funds || 0).toLocaleString('ar-SA')} <span class="row-sar">ريال</span></div>
        </div>`;
    }).join('');
  } else {
    document.getElementById('listWrapper').style.display = 'none';
  }

  if (!projects.length) {
    document.getElementById('top3').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🏆</div>
        <p>لا توجد مشاريع بعد</p>
      </div>`;
  }
});
</script>
</body>
</html>
