<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechnoVenture</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:#0e0520;
color:white;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#14092c;
border-bottom:1px solid #2d1b55;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

button{
background:#7c3aed;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
opacity:.9;
}

.page{
padding:40px;
max-width:1200px;
margin:auto;
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#1a0d38;
border-radius:12px;
padding:20px;
border:1px solid #2d1b55;
}

.team{
color:#a78bfa;
font-size:14px;
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#c4b5fd;
margin-bottom:20px;
}

.funds{
font-size:26px;
font-weight:700;
color:#a78bfa;
margin-bottom:10px;
}

.quick{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:10px;
}

.quick button{
background:#2d1b55;
}

.amountInput{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #2d1b55;
background:#221442;
color:white;
margin-bottom:10px;
}

.vote-btn{
width:100%;
background:linear-gradient(45deg,#7c3aed,#a78bfa);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #2d1b55;
background:#221442;
color:white;
}

.admin{
display:none;
max-width:600px;
margin:auto;
}


/* MOBILE OPTIMIZATION */

@media (max-width:600px){

header{
padding:15px;
flex-direction:column;
gap:10px;
}

.projects{
grid-template-columns:1fr;
}

.quick{
grid-template-columns:repeat(2,1fr);
}

.card{
padding:16px;
}

button{
padding:12px;
font-size:14px;
}

.vote-btn{
height:44px;
font-size:15px;
}

}

</style>

</head>


<body>


<header>

<div class="logo">

<img src="tecClub.jpg">

<h2>TechnoVenture</h2>

</div>

<div>

<button onclick="showMain()">المشاريع</button>

<button onclick="showAdmin()">الإدارة</button>

<button onclick="openLeaderboard()" style="background:#fbbf24;color:black">
Leaderboard
</button>

<button onclick="openTrending()" style="background:#ef4444">
 Trending
</button>

</div>

</header>



<div id="main" class="page">


<div id="loginSection" style="max-width:400px;margin:auto;margin-bottom:40px;text-align:center">

<h3> أدخل رقم الجوال</h3>

<input id="phoneInput" placeholder="05XXXXXXXX">

<button onclick="startVoting()">ابدأ الاستثمار</button>

</div>


<div id="balanceBox" style="display:none;text-align:center;margin-bottom:30px;font-size:20px">

 رصيدك المتبقي:

<span id="balance">500</span>

ريال

</div>


<div class="projects" id="projects"></div>


</div>



<div id="admin" class="admin page">

<div id="loginBox">

<h3> دخول الإدارة</h3>

<input type="password" id="adminPass">

<button onclick="login()">دخول</button>

</div>


<div id="adminPanel" style="display:none">

<h3>إضافة مشروع</h3>

<input id="title" placeholder="اسم المشروع">

<input id="team" placeholder="اسم الفريق">

<select id="category">
<option>AI</option>
<option>Health</option>
<option>Fintech</option>
<option>Mobile</option>
</select>

<input id="desc" placeholder="وصف المشروع">

<button onclick="addProject()">إضافة مشروع</button>

<div id="adminList"></div>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
updateDoc,
doc,
increment,
onSnapshot,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBPeJPWUdM0gb5502Ty8_Cfq4CwcufJOHQ",

authDomain: "tec-expo-voting.firebaseapp.com",

projectId: "tec-expo-voting",

storageBucket: "tec-expo-voting.firebasestorage.app",

messagingSenderId: "481340074318",

appId: "1:481340074318:web:5248e7eb360c4f5eed161f"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const projectsRef = collection(db,"projects");


let projects=[];
let currentUser=null;
let balance=500;
let adminUnlocked=false;



onSnapshot(projectsRef,(snapshot)=>{

projects=snapshot.docs.map(doc=>({
id:doc.id,
...doc.data()
})).filter(p=>!p.deleted);

render();

});



window.startVoting = async function(){

const phone = phoneInput.value;

if(!phone){
alert("أدخل رقم الجوال");
return;
}

currentUser=phone;

const userRef=doc(db,"users",phone);

const userSnap=await getDoc(userRef);

if(!userSnap.exists()){

await setDoc(userRef,{
phone:phone,
budget:500,
investments:{}
});

balance=500;

}else{

balance=userSnap.data().budget;

}

document.getElementById("balance").innerText=balance;

loginSection.style.display="none";
balanceBox.style.display="block";

};



function vibrate(){

if(navigator.vibrate){
navigator.vibrate(40);
}

}



window.investQuick = async function(id,amount){

if(!currentUser){
alert("أدخل رقم الجوال أولاً");
return;
}

if(amount>balance){
alert("رصيدك غير كافي");
return;
}

await updateDoc(doc(db,"projects",id),{
funds:increment(amount)
});

balance -= amount;

document.getElementById("balance").innerText=balance;

vibrate();

};



window.investCustom = async function(id){

const input=document.getElementById("amount-"+id);

const amount=parseInt(input.value);

if(!amount || amount<=0){
alert("أدخل مبلغ صحيح");
return;
}

if(amount>balance){
alert("رصيدك غير كافي");
return;
}

await updateDoc(doc(db,"projects",id),{
funds:increment(amount)
});

balance -= amount;

document.getElementById("balance").innerText=balance;

input.value="";

vibrate();

};



function render(){

const container=document.getElementById("projects");

container.innerHTML="";

projects.forEach(p=>{

container.innerHTML+=`

<div class="card">

<h3>${p.title}</h3>

<div class="team">${p.team}</div>

<div class="desc">${p.desc}</div>

<div class="funds">
 ${p.funds||0} ريال
</div>

<div class="quick">

<button onclick="investQuick('${p.id}',10)">10</button>

<button onclick="investQuick('${p.id}',50)">50</button>

<button onclick="investQuick('${p.id}',100)">100</button>

<button onclick="investQuick('${p.id}',200)">200</button>

</div>

<input class="amountInput" id="amount-${p.id}" placeholder="أدخل مبلغ">

<button class="vote-btn" onclick="investCustom('${p.id}')">

استثمر

</button>

</div>

`;

});

renderAdmin();

}



window.addProject = async function(){

if(!adminUnlocked) return;

await addDoc(projectsRef,{
title:title.value,
team:team.value,
category:category.value,
desc:desc.value,
funds:0,
deleted:false
});

};



function renderAdmin(){

if(!adminUnlocked) return;

const list=document.getElementById("adminList");

list.innerHTML="";

projects.forEach(p=>{

list.innerHTML+=`

<div>
${p.title}
<button onclick="deleteProject('${p.id}')">حذف</button>
</div>

`;

});

}



window.deleteProject = async function(id){

await updateDoc(doc(db,"projects",id),{
deleted:true
});

};



window.showAdmin=function(){
main.style.display="none";
admin.style.display="block";
};

window.showMain=function(){
main.style.display="block";
admin.style.display="none";
};



window.login=function(){

if(adminPass.value==="1415"){
adminUnlocked=true;
loginBox.style.display="none";
adminPanel.style.display="block";
}

};



window.openLeaderboard=function(){
window.open("leaderboard.html","_blank");
};

window.openTrending=function(){
window.open("trending.html","_blank");
};

</script>

</body>
</html>
